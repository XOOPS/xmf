name: SonarCloud
on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    if: github.repository == 'XOOPS/xmf'

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: "8.3"
          extensions: intl, mbstring
          tools: composer
          coverage: xdebug

      - name: Install dependencies
        run: composer update --prefer-stable --no-interaction --prefer-dist --no-progress

      - name: Ensure build directory exists
        run: mkdir -p build/logs

      - name: Run tests with coverage
        run: ./vendor/bin/phpunit --colors=always --coverage-clover build/logs/clover.xml

      - name: SonarCloud Scan
        if: ${{ secrets.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

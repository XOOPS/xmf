name: SonarCloud
on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    if: github.repository == 'XOOPS/xmf'

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: "8.3"
          extensions: intl, mbstring
          tools: composer
          coverage: xdebug

      - name: Install dependencies
        run: composer update --prefer-stable --no-interaction --prefer-dist --no-progress

      - name: Ensure build directory exists
        run: mkdir -p build/logs

      - name: Run tests with coverage
        run: ./vendor/bin/phpunit --colors=always --coverage-clover build/logs/clover.xml

      - name: SonarCloud Scan
        if: ${{ secrets.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
